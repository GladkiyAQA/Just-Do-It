<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro завершён</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="alarm.css" />
</head>
<body>

  <!-- ── Состояние 1: Pomodoro завершён ── -->
  <div class="state" id="stateWorkDone">
    <div class="alarm-emoji pulse" id="emojiWork">🍅</div>
    <h1 class="alarm-title">Время отдохнуть!</h1>
    <p class="alarm-subtitle" id="workPhrase"></p>
    <div class="alarm-actions">
      <button class="btn-primary" id="btnStartBreak">☕&nbsp; Начать перерыв</button>
      <button class="btn-secondary" id="btnContinue">▶&nbsp; Продолжить</button>
      <button class="btn-ghost" id="btnClose1">Закрыть</button>
    </div>
  </div>

  <!-- ── Состояние 2: Перерыв идёт ── -->
  <div class="state hidden" id="stateBreak">
    <div class="alarm-emoji float">🍹</div>
    <h1 class="alarm-title">Отдыхай!</h1>
    <div class="break-timer" id="breakTimerDisplay">05:00</div>
    <p class="alarm-subtitle">Расслабься, ты это заслужил</p>
    <div class="alarm-actions">
      <button class="btn-ghost" id="btnSkipBreak">Пропустить перерыв</button>
    </div>
  </div>

  <!-- ── Состояние 3: Перерыв завершён ── -->
  <div class="state hidden" id="stateBreakDone">
    <div class="alarm-emoji pulse">💪</div>
    <h1 class="alarm-title">Надеюсь, ты хорошо отдохнул!</h1>
    <p class="alarm-subtitle">Готов к следующему Pomodoro?</p>
    <div class="alarm-actions">
      <button class="btn-primary" id="btnNewPomodoro">🍅&nbsp; Новый Pomodoro</button>
      <button class="btn-ghost" id="btnClose2">Закрыть</button>
    </div>
  </div>

  <script src="alarm.js"></script>
</body>
</html>
