<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just Do It!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Caveat:wght@500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css" />
</head>

<body>

  <!-- ── Шапка ── -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="app-icon-wrap">✓</div>
      <span class="app-title">Just Do It!</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="btnTheme" title="Тема">🌙</button>
      <button class="icon-btn" id="btnAppSettings" title="Настройки">⚙</button>
    </div>
  </header>

  <!-- ── Вкладка: Задачи ── -->
  <div class="tab-content active" id="tabTasks">

    <!-- Pomodoro -->
    <div class="card timer-card">
      <div class="card-row-header">
        <div class="card-label-row">
          <span class="emoji-icon">🍅</span>
          <span class="section-label">Pomodoro</span>
        </div>
      </div>

      <div class="timer-mode-tabs">
        <button class="mode-btn active" data-mode="pomodoro">Работа</button>
        <button class="mode-btn" data-mode="short">Короткий</button>
        <button class="mode-btn" data-mode="long">Длинный</button>
      </div>

      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-subtitle" id="timerSubtitle">Фокус на задаче</div>

      <button class="btn-start-wide" id="btnStart">▶&nbsp; Старт</button>

      <div class="timer-controls-secondary">
        <button class="btn-secondary-round" id="btnPause" disabled title="Пауза">⏸</button>
        <button class="btn-secondary-round" id="btnReset" title="Сброс">↺</button>
      </div>
    </div>

    <!-- Текущая задача -->
    <div class="card current-task-card">
      <div class="card-row-header">
        <span class="section-label">Текущая задача</span>
        <button class="link-btn" id="btnChangeTask">Изменить</button>
      </div>
      <div class="current-task-text" id="currentTaskText">Нет задачи</div>
    </div>

    <!-- Список задач -->
    <div class="card tasks-card">
      <div class="card-row-header">
        <div class="card-label-row">
          <span class="section-label" id="dateSectionLabel">Сегодня</span>
          <span class="task-count-badge" id="taskCountBadge">0</span>
        </div>
        <button class="btn-add-circle" id="btnAddTask">+</button>
      </div>

      <!-- Поле ввода (скрыто) -->
      <div class="add-task-row" id="addTaskRow" style="display:none">
        <input type="text" id="newTaskInput" placeholder="Новая задача..." />
      </div>

      <ul id="taskList"></ul>
    </div>

    <!-- Импорт -->
    <div class="import-row">
      <label class="import-label" for="mdFileInput">⬆ Импорт .md</label>
      <input type="file" id="mdFileInput" accept=".md" />
    </div>

  </div><!-- /tabTasks -->

  <!-- ── Вкладка: Статистика ── -->
  <div class="tab-content" id="tabStats">
    <div class="placeholder-tab">
      <span class="placeholder-icon">📊</span>
      <span>Статистика появится здесь</span>
    </div>
  </div>

  <!-- ── Вкладка: Календарь ── -->
  <div class="tab-content" id="tabCalendar">
    <div class="card calendar-card">
      <div class="cal-header">
        <button class="cal-nav-btn" id="calPrev">‹</button>
        <span class="cal-month-label" id="calMonthYear"></span>
        <button class="cal-nav-btn" id="calNext">›</button>
      </div>
      <div class="cal-weekdays">
        <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- ── Нижняя навигация ── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="tabTasks" title="Задачи">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3" />
        <path d="M9 12l2 2 4-4" />
      </svg>
    </button>
    <button class="nav-btn" data-tab="tabStats" title="Статистика">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 20V10M12 20V4M6 20v-6" />
      </svg>
    </button>
    <button class="nav-btn" data-tab="tabCalendar" title="Календарь">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <path d="M16 2v4M8 2v4M3 10h18" />
      </svg>
    </button>
  </nav>

  <!-- Task picker modal -->
  <div class="modal-overlay" id="taskPickerOverlay">
    <div class="modal-sheet" id="taskPickerSheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span class="modal-title">Выбрать задачу</span>
        <button class="modal-close" id="btnCloseTaskPicker">×</button>
      </div>
      <ul class="picker-list" id="pickerList"></ul>
    </div>
  </div>

  <audio id="doneSound" src="https://www.soundjay.com/buttons/sounds/button-09a.mp3" preload="auto"></audio>
  <script src="js/app.js" type="module"></script>
</body>

</html>
